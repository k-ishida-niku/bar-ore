    <script type="text/javascript">
      // 💡 送られてきたデータから、元のURLを復元する「受け手」
      ((l) => {
        if (l.search[1] === "/") {
          const decoded = l.search
            .slice(1)
            .split("&")
            .map((s) => s.replace(/~and~/g, "&"))
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, l.pathname.lastIndexOf("/")) + decoded + l.hash);
        }
      })(window.location);
    </script>
